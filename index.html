<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>amkyawdev-edits | Video Editor</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loader -->
    <div id="loader" class="loader-container">
        <div class="loader-content">
            <div class="loader-logo">
                <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Play triangle with teal accent -->
                    <path d="M20 15L48 30L20 45V15Z" fill="url(#tealGradient)"/>
                    <defs>
                        <linearGradient id="tealGradient" x1="20" y1="15" x2="48" y2="45" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#0D3C4C"/>
                            <stop offset="100%" stop-color="#5DC3B5"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="loader-title">amkyawdev-edits</h1>
            <p class="loader-subtitle">Loading Video Editor...</p>
            <div class="loader-progress">
                <div class="loader-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app-container hidden">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <svg width="28" height="28" viewBox="0 0 60 60" fill="none">
                    <path d="M20 15L48 30L20 45V15Z" fill="url(#tealGradient2)"/>
                    <defs>
                        <linearGradient id="tealGradient2" x1="20" y1="15" x2="48" y2="45" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#0D3C4C"/>
                            <stop offset="100%" stop-color="#5DC3B5"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="brand-text">amkyawdev-edits</span>
            </div>
            <div class="header-actions">
                <button id="btn-export" class="btn btn-teal" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Export
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Area (shown when no video loaded) -->
            <div id="upload-area" class="upload-area">
                <div class="upload-box">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <h2>Drop your video here</h2>
                    <p>or click to browse</p>
                    <input type="file" id="file-input" accept="video/*" hidden>
                    <button class="btn btn-teal-outline" id="btn-browse">Browse Files</button>
                    <p class="upload-hint">Supported formats: MP4, WebM, MOV, AVI</p>
                </div>
            </div>

            <!-- Editor Area (shown when video loaded) -->
            <div id="editor-area" class="editor-area hidden">
                <!-- Video Player -->
                <div class="video-container">
                    <video id="video-player" class="video-player" preload="metadata"></video>
                    <div class="video-overlay" id="video-overlay">
                        <button class="play-btn" id="btn-play">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Processing Indicator -->
                    <div id="processing-indicator" class="processing-indicator hidden">
                        <div class="spinner"></div>
                        <span>Processing...</span>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="timeline-container">
                    <div class="timeline-header">
                        <span class="time-display" id="current-time">00:00:00</span>
                        <span class="time-separator">/</span>
                        <span class="time-display" id="duration-time">00:00:00</span>
                    </div>
                    <div class="timeline" id="timeline">
                        <div class="timeline-track" id="timeline-track">
                            <div class="timeline-progress" id="timeline-progress"></div>
                            <div class="timeline-handle" id="timeline-handle"></div>
                            <div class="trim-markers" id="trim-markers">
                                <div class="trim-start" id="trim-start">
                                    <div class="trim-handle"></div>
                                    <span class="trim-label">Start</span>
                                </div>
                                <div class="trim-end" id="trim-end">
                                    <div class="trim-handle"></div>
                                    <span class="trim-label">End</span>
                                </div>
                                <div class="trim-region" id="trim-region"></div>
                            </div>
                        </div>
                    </div>
                    <div class="timeline-controls">
                        <button class="btn btn-icon" id="btn-skip-back" title="Skip Back 5s">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="11 19 2 12 11 5 11 19"/>
                                <polygon points="22 19 13 12 22 5 22 19"/>
                            </svg>
                        </button>
                        <button class="btn btn-icon btn-play" id="btn-timeline-play" title="Play/Pause">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="play-icon">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="pause-icon hidden">
                                <rect x="6" y="4" width="4" height="16"/>
                                <rect x="14" y="4" width="4" height="16"/>
                            </svg>
                        </button>
                        <button class="btn btn-icon" id="btn-skip-forward" title="Skip Forward 5s">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13 19 22 12 13 5 13 19"/>
                                <polygon points="2 19 11 12 2 5 2 19"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="toolbar-section">
                        <h3 class="toolbar-title">Trim</h3>
                        <div class="trim-controls">
                            <div class="input-group">
                                <label>Start</label>
                                <input type="text" id="trim-start-input" value="00:00:00" readonly>
                            </div>
                            <div class="input-group">
                                <label>End</label>
                                <input type="text" id="trim-end-input" value="00:00:00" readonly>
                            </div>
                            <button class="btn btn-teal-sm" id="btn-apply-trim">Apply</button>
                            <button class="btn btn-outline-sm" id="btn-reset-trim">Reset</button>
                        </div>
                    </div>
                    
                    <div class="toolbar-divider"></div>
                    
                    <div class="toolbar-section">
                        <h3 class="toolbar-title">Filters</h3>
                        <div class="filter-grid">
                            <button class="filter-btn" data-filter="brightness">
                                <span class="filter-icon">☀️</span>
                                <span>Brightness</span>
                            </button>
                            <button class="filter-btn" data-filter="contrast">
                                <span class="filter-icon">◐</span>
                                <span>Contrast</span>
                            </button>
                            <button class="filter-btn" data-filter="saturation">
                                <span class="filter-icon">🎨</span>
                                <span>Saturation</span>
                            </button>
                            <button class="filter-btn" data-filter="grayscale">
                                <span class="filter-icon">⬜</span>
                                <span>Grayscale</span>
                            </button>
                            <button class="filter-btn" data-filter="sepia">
                                <span class="filter-icon">📜</span>
                                <span>Sepia</span>
                            </button>
                            <button class="filter-btn" data-filter="blur">
                                <span class="filter-icon">💧</span>
                                <span>Blur</span>
                            </button>
                        </div>
                        <div class="filter-slider hidden" id="filter-slider">
                            <label id="filter-slider-label">Adjust:</label>
                            <input type="range" id="filter-value" min="0" max="2" step="0.1" value="1">
                            <span id="filter-value-display">1.0</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
